# LCFv1 (Livin Chart Format v1)
# Automatically generated by the CLI tool

# This is gonna be the base for all the conversions and the native chart format
# Will be separated in files in order to maintain readibility and line usage at a minimum
# Please refer to the Original Format file inside this folder 

# Represents the first fields before the notes array
[metadata]
difficulty = "normal" # The difficulty of the chart
bpm = 120 # The bpm of the song 
grids_per_beat = 4 # The amount of steps / grids in a beat
note_offset = 0 # The offset of the song
generated_by = "LivinOnSweets - ChartConverter v1"

# Array of beat highlights, its used for grid lines
[[beat_highlights]]
start_beat = 0 # The beginning of the beat highlight
end_beat = 4 # The end of the current beat highlight
interval = 4 # Steps / Grids per beat in the current beat highlight (References beat_highlight)

# Begin the array of notes
# Lets take for example the basic note
[[notes]]
type = "basic" # The type of note
lane = 1 # Which lane
start = { beat = 0, grid = 2 } # The beat and grid properties unified in an object, this one is used for spawning the note
grids_per_beat = 4 # Can be optional and will use the metadata value
fever = false # If the note is in fever mode

# Now lets add an example of the long note
[[notes]]
type = "long" 
lane = 2
start = { beat = 4, grid = 1 }
end = { beat = 16, grid = 2 } # The end properties of the note, representing when the hold finishes
grids_per_beat = 4
fever = false