# LCFv1.2 (Livin Chart Format v1.2)
# Made by hand, should be generated by the API

# Changes from v1.2:
# Added a section for timing points
# Added a section for scroll velocities

[metadata]
difficulty = "normal" # The difficulty of the chart
bpm = 120 # The starting bpm of the song 
grids_per_beat = 4 # The amount of steps / grids in a beat
note_offset = 0 # The offset of the song
version = "1.2.0" # Semantic versioning
generated_by = "LivinOnSweets - ChartConverter v1.0.2"

[[timing_points]]
start = { beat = 0, grid = 0, time = 0 } # inherits from a time object, the same ones as the notes, not called time since time.time seems weird
bpm = 120 # the bpm of the point
signature_numerator = 4 # the signature nominator
signature_denominator = 4 # the signature denominator

[[scroll_velocities]]
start = { beat = 0, grid = 0, time = 0 } # inherits from a time object
multiplier = 1.0

# the rest is still the same