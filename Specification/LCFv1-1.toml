# LCFv1.1 (Livin Chart Format v1.1)
# Made by hand, should be generated by the API

# Changes from v1:
# Made the fever field optional
# Added a version field to the metadata
# Added raw times to the start/end objects
# Added an optional bpm property to the note object

# Represents the first fields before the notes array
[metadata]
difficulty = "normal" # The difficulty of the chart
bpm = 120 # The bpm of the song 
grids_per_beat = 4 # The amount of steps / grids in a beat
note_offset = 0 # The offset of the song
version = "1.1.0" # Semantic versioning
generated_by = "LivinOnSweets - ChartConverter v1.0.1"

# Array of beat highlights, its used for grid lines
[[beat_highlights]]
start_beat = 0 # The beginning of the beat highlight
end_beat = 4 # The end of the current beat highlight
interval = 4 # Steps / Grids per beat in the current beat highlight (References beat_highlight)

# Begin the array of notes
# Lets take for example the basic note
[[notes]]
type = "basic" # The type of note
lane = 1 # Which lane
# The beat and grid properties unified in an object, this one is used for spawning the note, 
# if the raw time is present it will be used instead of using the beat and grid
start = { beat = 0, grid = 2, time = 1230 }
grids_per_beat = 4 # Can be optional and will use the metadata value
fever = false # If the note is in fever mode, optional
bpm = 140 # The note has a custom bpm which can modify the spawn time of the note unless the raw time is set

# Now lets add an example of the long note
[[notes]]
type = "long"
lane = 2
start = { beat = 4, grid = 1, time = 1200 }
end = { beat = 16, grid = 2, time = 1500 } # The end properties of the note, representing when the hold finishes
grids_per_beat = 4
fever = false